{% extends "taller/base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-card p-4">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Tipo *</label>
            {{ form.tipo }}
          </div>
          <div class="col-md-4">
            <label class="form-label">Marca *</label>
            {{ form.marca }}
          </div>
          <div class="col-md-4">
            <label class="form-label">Modelo</label>
            {{ form.modelo }}
          </div>
          <div class="col-md-6">
            <label class="form-label">N° Serie</label>
            {{ form.serial }}
          </div>
          <div class="col-md-6">
            <label class="form-label">Foto del equipo</label>
            {{ form.foto }}
          </div>
          <div class="col-12">
            <label class="form-label">Descripción adicional</label>
            {{ form.descripcion }}
          </div>
        </div>
      </div>
      <div class="d-flex gap-2 justify-content-end mt-3">
        <a href="{% url 'detalle_cliente' cliente.pk %}" class="btn btn-outline-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary px-4">
          <i class="bi bi-check-lg me-1"></i> Guardar equipo
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
