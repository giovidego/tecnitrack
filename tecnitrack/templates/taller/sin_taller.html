<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin taller asignado — OrdenTec</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      background: #f0f0ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .card-wrap {
      background: white;
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(79,70,229,0.10);
      border: 1px solid #e5e7eb;
    }
    .icon-wrap {
      width: 72px; height: 72px;
      background: #fef3c7;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }
  </style>
</head>
<body>
  <div class="card-wrap">
    <div class="icon-wrap">
      <i class="bi bi-shop" style="color:#d97706;"></i>
    </div>
    <h2 class="fw-bold mb-2" style="font-size:1.3rem;">Sin taller asignado</h2>
    <p class="text-muted mb-4">
      Tu usuario no está vinculado a ningún taller todavía.
      Pide al administrador que te agregue, o registra tu propio taller.
    </p>
    <div class="d-flex flex-column gap-2">
      <a href="{% url 'registro_taller' %}" class="btn btn-primary">
        <i class="bi bi-plus-circle me-2"></i>Registrar mi taller
      </a>
      <a href="{% url 'logout' %}" class="btn btn-outline-secondary">
        <i class="bi bi-box-arrow-left me-2"></i>Cerrar sesión
      </a>
    </div>
  </div>
</body>
</html>
