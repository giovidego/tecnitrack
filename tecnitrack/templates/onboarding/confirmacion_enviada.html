<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revisa tu email — OrdenTec</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f0f0ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', system-ui, sans-serif; }
    .card-wrap { background: white; border-radius: 20px; padding: 3rem 2.5rem; max-width: 440px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(79,70,229,0.12); }
    .icon-wrap { width: 80px; height: 80px; background: #eef2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2rem; color: #4f46e5; }
  </style>
</head>
<body>
<div class="card-wrap">
  <div class="icon-wrap"><i class="bi bi-envelope-check"></i></div>
  <h2 class="fw-bold mb-2">¡Revisa tu correo!</h2>
  <p class="text-muted mb-3">Enviamos un link de confirmación a:</p>
  <div style="background:#eef2ff; color:#4f46e5; padding:0.75rem 1.25rem; border-radius:10px; font-weight:700; margin-bottom:1.5rem; word-break:break-all;">
    {{ email }}
  </div>
  <p class="text-muted small mb-0">
    Haz click en el link del email para continuar con la configuración de tu taller.
    El link expira en 48 horas.
  </p>
  <div class="mt-3 text-muted" style="font-size:0.8rem;">
    ¿No llegó? Revisa la carpeta de spam o
    <a href="{% url 'registro_taller' %}" class="text-primary text-decoration-none">intenta de nuevo</a>.
  </div>
</div>
</body>
</html>
